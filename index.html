<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A141C">
<meta name="description" content="Fútbol: resultados, calendario, clasificación, predicciones y pronóstico de temporada de las grandes ligas. Web y móvil.">
<title>Fútbol · En vivo y predicciones</title>

<!-- Defensa en profundidad: misma política que vercel.json (también aplica en dev). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://media.api-sports.io https://flagcdn.com; connect-src 'self' https://media.api-sports.io; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'">

<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./public/icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./public/icons/icon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/styles/app.css">
</head>
<body>

<header class="appbar">
  <div class="appbar-row">
    <div class="brand" id="brand" role="button" tabindex="0">
      <div class="ball">
        <svg viewBox="0 0 24 24" fill="none" stroke="#06140d" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7l4 3-1.5 5h-5L8 10z"/></svg>
      </div>
      <div>
        <h1>FÚTBOL</h1>
        <div class="sub" id="brandSub">Grandes ligas</div>
      </div>
    </div>
    <button class="iconbtn" id="btnElo" title="Ranking Elo" aria-label="Ranking Elo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V10M10 19V5M16 19v-7M21 19H3"/></svg>
    </button>
    <button class="iconbtn" id="btnRefresh" title="Actualizar" aria-label="Actualizar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg>
    </button>
    <button class="iconbtn" id="btnInfo" title="Acerca de" aria-label="Acerca de">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 7.5v.5"/></svg>
    </button>
  </div>
  <div class="leaguebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="9"/><path d="M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18M3 12h18"/></svg>
    <select id="leagueSel" aria-label="Elegir competición"></select>
  </div>
  <div class="updated" id="updatedLabel"><span class="dotpulse"></span><span>Cargando…</span></div>
  <div id="substrip"></div>
</header>

<div class="layout">
  <nav class="nav" id="nav">
    <button data-tab="hoy" class="on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11l9-8 9 8M5 9.5V21h14V9.5"/></svg>
      <span class="lb">Hoy</span>
    </button>
    <button data-tab="partidos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
      <span class="lb">Partidos</span>
    </button>
    <button data-tab="tabla">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M3 14h18M9 4v16"/></svg>
      <span class="lb">Tabla</span>
    </button>
    <button data-tab="prediccion">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3l2 5 5 .5-3.8 3.3L16.5 17 12 14l-4.5 3 1.3-5.2L5 8.5 10 8z"/></svg>
      <span class="lb">Predicción</span>
    </button>
    <button data-tab="pronostico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0zM5 5H3v2a3 3 0 0 0 3 3M19 5h2v2a3 3 0 0 1-3 3"/></svg>
      <span class="lb">Pronóstico</span>
    </button>
  </nav>

  <main id="view"></main>
</div>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet"><div class="grip"></div><div class="sheet-inner" id="sheetInner"></div></div>
<div class="toast" id="toast"></div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
